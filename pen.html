<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meditation UI</title>

<link rel="stylesheet" href="pen.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<div class="phone">

    <div class="top-area">
        <button class="back">
            <i class="fa-solid fa-arrow-left"></i>
        </button>

        <div class="banner">
            <div class="meditation-icon">
                <i class="fa-solid fa-person"></i>
            </div>
        </div>
    </div>

    <div class="title-area">
        <h1>Instruções</h1>
        <p>O que você quer fazer?</p>
    </div>

    <div class="grid">

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-book-open"></i>
            </div>
            <span>Aprender meditações</span>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-heart-circle-check"></i>
            </div>
            <span>Aliviar o estresse</span>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-leaf"></i>
            </div>
            <span>Relaxe você mesmo</span>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-brain"></i>
            </div>
            <span>Poder da mente</span>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-compact-disc"></i>
            </div>
            <span>Meditação relaxante</span>
        </div>

        <div class="card">
            <div class="icon">
                <i class="fa-solid fa-user"></i>
            </div>
            <span>Cuide de você mesmo</span>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
